[build]
target = "x86_64-unknown-none"

[unstable]
build-std = ["core"]
build-std-features = ["compiler-builtins-mem"]

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-static",
    "-C", "link-arg=-Tlinker.ld", # Змінили шлях на чистий linker.ld
    "-C", "code-model=kernel",
]